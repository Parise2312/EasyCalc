<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Calculadora-Temp</title>
</head>
<body>

<div class="container">

  <label>Temperatura</label>
  <input type="number" id="valor" placeholder="Temperatura">

  <label>Tipo de conversão</label>
  <select id="tipo">
    <option value="c-f">Celsius → Fahrenheit</option>
    <option value="f-c">Fahrenheit → Celsius</option>
  </select>

  <button id="btnConverter">Converter</button>

  <p id="resultado"></p>

</div>



<script src="script.js" defer></script>
</body>
</html>
